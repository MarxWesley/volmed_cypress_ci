name: Cypress Tests

on: 
  push:
    branches: [main, testes]
  pull_request: 
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: 
        browser: [chrome] # começa só com chrome

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências 
        run: |
          npm install
          cd server && npm install
          cd ../web && npm install

      - name: Run Cypress Tests
        uses: cypress-io/github-actions@v6
        with:
          start: |
            npm run start:back
            npm run start:front
          wait-on: 'http://localhost:3000,http://localhost:8080'
          wait-on-timeout: 120
          browser: ${{ matrix.browser }}
          spec: cypress/e2e/**/*.cy.js