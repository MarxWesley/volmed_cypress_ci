name: Cypress Tests

on: 
  push:
    branches: [main, testes]
  pull_request: 
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    strategy:
        matrix: 
            browser: [chrome, firefox, edge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências 
        run: |
          npm install
          cd server && npm install
          cd ../web && npm install

      - name: Run Cypress Tests
        uses: cypress-io/github-actions@v6
        with:
            start: |
                npm run start:back
                npm run start:front
            wait-on: 'http://localhost:3000,http://localhost:8080'
            wait-on-timeout: 120 # até 2 minutos espera subir
            browser: chrome
            parallel: true
            spec: 
                cypress/e2e/**/*.cy.js